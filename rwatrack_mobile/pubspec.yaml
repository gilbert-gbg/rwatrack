name: rwatrack_mobile
description: RWATRACK - AI-Driven Government Employee Residence Tracking System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP requests
  http: ^1.2.0
  # Secure storage for token
  flutter_secure_storage: ^10.0.0
  # GPS location
  geolocator: ^14.0.2
  # Permission handling
  permission_handler: ^12.0.1
  # Shared preferences
  shared_preferences: ^2.2.3
  # State management
  provider: ^6.1.1
  # Network connectivity
  connectivity_plus: ^6.0.3
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true